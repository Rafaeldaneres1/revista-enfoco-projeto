<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Revista Enfoco, publicação digital de Santa Maria - RS com notícias, colunas, agenda e edições especiais."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <title>Revista Enfoco | Santa Maria RS</title>
    <script>
      window.addEventListener(
        'error',
        function (event) {
          if (
            event.error instanceof DOMException &&
            event.error.name === 'DataCloneError' &&
            event.message &&
            event.message.includes('PerformanceServerTiming')
          ) {
            event.stopImmediatePropagation();
            event.preventDefault();
          }
        },
        true
      );
    </script>
  </head>
  <body>
    <noscript>Você precisa habilitar JavaScript para abrir a Revista Enfoco.</noscript>
    <div id="root"></div>
  </body>
</html>
